<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mateon — локальная платформа для изучения геометрии.">
  <title>Mateon</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js" defer></script>
  <script src="course-data.js" defer></script>
  <script src="scene-renderers.js" defer></script>
  <script src="app-core.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <div class="app">
    <header class="topbar panel">
      <div class="brand">
        <div class="brand-mark">M</div>
        <div>
          <h1>Mateon</h1>
        </div>
      </div>

      <nav class="nav" aria-label="Навигация">
        <a class="nav-link" href="#home">Главная</a>
        <a class="nav-link" href="#theory">Теория</a>
        <a class="nav-link" href="#tests">Тесты</a>
        <a class="nav-link" href="#scene">Сцена</a>
      </nav>

      <div class="topbar-actions">
        <div class="xp-box">
          <span>XP</span>
          <strong id="xp-total">0</strong>
        </div>
        <button class="ghost-button" id="reset-progress" type="button">Сбросить прогресс</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar panel">
        <h2>Mateon</h2>

        <div class="sidebar-actions">
          <a class="button secondary" href="#theory">Темы</a>
          <a class="button secondary" href="#tests">Тесты</a>
          <a class="button secondary" href="#scene">Сцена</a>
        </div>

        <div class="sidebar-block">
          <div class="title-row">
            <h3>Темы</h3>
            <span class="badge" id="topic-count">0</span>
          </div>
          <div id="topic-shortcuts" class="shortcut-list"></div>
        </div>
      </aside>

      <section class="content">
        <section class="panel main-panel">
          <div class="title-row">
            <div>
              <h2 id="view-title">Главная</h2>
            </div>
            <span class="badge" id="route-badge">#home</span>
          </div>
          <div id="view-root"></div>
        </section>
      </section>
    </main>
  </div>
</body>
</html>
