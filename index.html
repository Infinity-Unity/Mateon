<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Матеон — школьная математика</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@600;700&family=Manrope:wght@400;500;700;800&display=swap');

    :root {
      --bg-1: #12051f;
      --bg-2: #0f1d22;
      --surface: rgba(16, 20, 28, 0.78);
      --surface-strong: rgba(23, 29, 39, 0.92);
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef6f0;
      --muted: #9eb1ab;
      --green: #3ddc84;
      --danger: #ff6f7d;
      --warning: #ffb84d;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      --radius-xl: 28px;
      --transition: 220ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: "Manrope", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 20%, rgba(140, 68, 255, 0.32), transparent 28%),
        radial-gradient(circle at 88% 15%, rgba(61, 220, 132, 0.22), transparent 24%),
        linear-gradient(135deg, #15051f 0%, #2f0a47 28%, #0b2f27 70%, #071714 100%);
      background-size: 160% 160%;
      animation: gradientFlow 14s ease-in-out infinite;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      top: -100px;
      left: -120px;
      background: #a34cff;
      animation: floatOrb 16s ease-in-out infinite;
    }

    body::after {
      right: -80px;
      bottom: -130px;
      background: #24d07a;
      animation: floatOrb 20s ease-in-out infinite reverse;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
    }

    .workspace {
      width: 100%;
      padding: 20px;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 16px 18px;
      background: rgba(9, 12, 18, 0.65);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      position: sticky;
      top: 18px;
      z-index: 20;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-family: "Comfortaa", sans-serif;
      font-size: 1.5rem;
      background: linear-gradient(145deg, rgba(61, 220, 132, 0.95), rgba(120, 255, 186, 0.9));
      color: #062212;
      box-shadow: 0 16px 30px rgba(61, 220, 132, 0.25);
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #8bcdb0;
    }

    .brand-title {
      margin: 0;
      font-family: "Comfortaa", sans-serif;
      font-size: clamp(1.2rem, 2.4vw, 1.7rem);
    }

    .topnav {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-chip,
    .button,
    .ghost-button,
    .icon-button,
    .mode-option {
      transition: transform var(--transition), background var(--transition), box-shadow var(--transition), opacity var(--transition);
    }

    .nav-chip {
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(61, 220, 132, 0.14);
      color: #dffff0;
      border: 1px solid rgba(61, 220, 132, 0.24);
      font-weight: 700;
    }

    .nav-chip.active,
    .nav-chip:hover {
      background: rgba(61, 220, 132, 0.18);
      border-color: rgba(61, 220, 132, 0.35);
      transform: translateY(-1px);
    }

    .topbar-right,
    .header-stats,
    .actions-row,
    .tag-row,
    .chip-row,
    .course-meta,
    .lesson-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .topbar-right {
      align-items: center;
      justify-content: flex-end;
    }

    .header-stats {
      justify-content: flex-end;
    }

    .stat-pill,
    .meta-tag,
    .status-tag,
    .soft-chip {
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.9rem;
    }

    .icon-button {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      background: linear-gradient(180deg, #39d77d, #1fa95f);
      color: #05210f;
      font-size: 1.25rem;
      font-weight: 800;
      box-shadow: 0 16px 26px rgba(29, 167, 95, 0.3);
    }

    .button,
    .ghost-button {
      padding: 13px 18px;
      border-radius: 16px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .button {
      background: linear-gradient(180deg, var(--green), #1fb765);
      color: #05210f;
      box-shadow: 0 14px 24px rgba(61, 220, 132, 0.22);
    }

    .ghost-button {
      background: rgba(61, 220, 132, 0.14);
      color: #dffff0;
      border: 1px solid rgba(61, 220, 132, 0.24);
    }

    .button:hover,
    .icon-button:hover,
    .ghost-button:hover,
    .mode-option:hover {
      transform: translateY(-2px) scale(1.01);
    }

    .button:active,
    .icon-button:active,
    .ghost-button:active,
    .mode-option:active {
      transform: translateY(1px) scale(0.98);
    }

    .content {
      padding: 26px 4px 40px;
      animation: fadeUp 360ms ease;
    }

    .panel,
    .metric-card,
    .mini-card,
    .course-card,
    .lesson-card,
    .theory-card,
    .achievement-card,
    .profile-card,
    .module-card,
    .lesson-copy,
    .task-panel,
    .theory-article,
    .formula-card,
    .example-card {
      background: rgba(16, 20, 28, 0.78);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero,
    .detail-grid,
    .lesson-layout,
    .theory-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 18px;
      align-items: start;
    }

    .stats-grid,
    .course-grid,
    .module-grid,
    .achievement-grid {
      display: grid;
      gap: 18px;
    }

    .stats-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 24px;
    }

    .course-grid {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .module-grid,
    .achievement-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .section-head,
    .lesson-row-head,
    .sidebar-head,
    .modal-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-title,
    .card-title,
    .course-card h3,
    .module-card h3,
    .lesson-card h3,
    .theory-card h3 {
      margin: 0 0 10px;
    }

    .hero-copy h2 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.05;
      font-family: "Comfortaa", sans-serif;
    }

    .hero-copy p,
    .course-card p,
    .module-card p,
    .theory-article p,
    .lesson-copy p,
    .theory-article li {
      line-height: 1.7;
      color: var(--muted);
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      margin: 14px 0;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #3ce08a, #8bffb2);
      box-shadow: 0 0 18px rgba(61, 220, 132, 0.4);
    }

    .status-tag.success {
      background: rgba(61, 220, 132, 0.16);
      border-color: rgba(61, 220, 132, 0.3);
      color: #b6ffcf;
    }

    .status-tag.warning {
      background: rgba(255, 184, 77, 0.16);
      border-color: rgba(255, 184, 77, 0.3);
      color: #ffd692;
    }

    .status-tag.danger {
      background: rgba(255, 111, 125, 0.18);
      border-color: rgba(255, 111, 125, 0.34);
      color: #ffced4;
    }

    .sidebar {
      position: fixed;
      top: 14px;
      right: 14px;
      bottom: 14px;
      width: min(390px, calc(100vw - 28px));
      background: rgba(11, 16, 22, 0.96);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 22px;
      z-index: 60;
      overflow-y: auto;
      transform: translateX(calc(100% + 20px));
      transition: transform 280ms ease;
      backdrop-filter: blur(28px);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-scrim {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.42);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
      z-index: 50;
    }

    .sidebar-scrim.active {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar-stack,
    .sidebar-nav,
    .theory-sidebar,
    .formula-list,
    .lesson-list {
      display: grid;
      gap: 12px;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .mode-option,
    .theory-link,
    .close-button,
    .nav-row {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(61, 220, 132, 0.14);
      color: #dffff0;
      border: 1px solid rgba(61, 220, 132, 0.24);
      text-align: left;
      font-weight: 700;
    }

    .close-button {
      width: 42px;
      height: 42px;
      padding: 0;
      text-align: center;
    }

    .mode-option.active,
    .theory-link.active,
    .theory-link:hover {
      background: rgba(61, 220, 132, 0.16);
      border-color: rgba(61, 220, 132, 0.3);
      color: #c3ffd8;
    }

    .lesson-row,
    .option-card,
    .mini-note {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .formula-list,
    .lesson-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .formula-card {
      background: rgba(140, 68, 255, 0.12);
    }

    .formula-sign {
      font-size: 1.14rem;
      font-weight: 800;
      color: #d7cbff;
      margin-bottom: 8px;
    }

    .task-options {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .option-card {
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }

    .option-card:hover {
      background: rgba(61, 220, 132, 0.08);
      border-color: rgba(61, 220, 132, 0.26);
      transform: translateX(2px);
    }

    .option-card input {
      accent-color: #37d77f;
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .input,
    .textarea,
    .select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      outline: none;
    }

    .textarea {
      min-height: 132px;
      resize: vertical;
    }

    .label {
      display: grid;
      gap: 8px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .feedback-box {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid transparent;
    }

    .feedback-box.success {
      background: rgba(61, 220, 132, 0.12);
      border-color: rgba(61, 220, 132, 0.28);
    }

    .feedback-box.error {
      background: rgba(255, 111, 125, 0.12);
      border-color: rgba(255, 111, 125, 0.28);
    }

    .feedback-box.warning {
      background: rgba(255, 184, 77, 0.12);
      border-color: rgba(255, 184, 77, 0.28);
    }

    .breadcrumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .breadcrumbs button {
      background: none;
      color: inherit;
      padding: 0;
    }

    .modal-layer {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.56);
      z-index: 80;
    }

    .modal {
      width: min(760px, 100%);
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      background: rgba(13, 18, 25, 0.98);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .form-grid .full {
      grid-column: 1 / -1;
    }

    .toast-stack {
      position: fixed;
      right: 20px;
      bottom: 20px;
      display: grid;
      gap: 10px;
      z-index: 90;
    }

    .toast {
      min-width: 240px;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(10, 15, 20, 0.96);
      border: 1px solid rgba(61, 220, 132, 0.22);
      box-shadow: var(--shadow);
    }

    .hearts {
      display: inline-flex;
      gap: 6px;
      font-size: 1.12rem;
    }

    .heart.empty {
      opacity: 0.28;
    }

    .empty-state {
      padding: 28px;
      text-align: center;
    }

    @keyframes gradientFlow {
      0%, 100% { background-position: 0% 30%; }
      50% { background-position: 100% 70%; }
    }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, 40px) scale(1.08); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1080px) {
      .hero,
      .detail-grid,
      .lesson-layout,
      .theory-grid,
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .workspace { padding: 14px; }
      .topbar { grid-template-columns: 1fr; }
      .topnav,
      .topbar-right,
      .header-stats { justify-content: flex-start; }
      .form-grid { grid-template-columns: 1fr; }
      .sidebar,
      .modal,
      .panel,
      .lesson-copy,
      .task-panel,
      .theory-article,
      .formula-card,
      .example-card { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar" aria-hidden="true"></aside>
    <div id="sidebarScrim" class="sidebar-scrim"></div>

    <div class="workspace">
      <header class="topbar">
        <div class="brand-wrap">
          <div class="brand-mark">∑</div>
          <div>
            <p class="eyebrow">math for school</p>
            <h1 class="brand-title">Матеон</h1>
          </div>
        </div>

        <nav class="topnav">
          <button class="nav-chip" data-nav="home">Курсы</button>
          <button class="nav-chip" data-nav="theory">Теория</button>
        </nav>

        <div class="topbar-right">
          <div id="headerStats" class="header-stats"></div>
          <button id="burgerButton" class="icon-button" aria-label="Открыть меню">☰</button>
        </div>
      </header>

      <main id="app" class="content"></main>
    </div>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-stack"></div>

  <script>
    // Ключ для полного состояния приложения в localStorage.
    const STORAGE_KEY = "mateon_local_storage_v1";
    const XP_PER_LESSON = 20;
    const BRAND_NAME = "Матеон";
    const FIGURE_THEORY_IDS = [
      "figure_sphere",
      "figure_cube",
      "figure_pyramid",
      "figure_ball",
      "figure_triangle",
      "figure_quadrilateral",
      "figure_rectangle",
      "figure_cylinder"
    ];

    const ACHIEVEMENTS = [
      {
        id: "young_pythagor",
        title: "Юный Пифагор",
        description: "Пройди 5 уроков и почувствуй уверенность в решениях.",
        icon: "△"
      },
      {
        id: "equation_master",
        title: "Мастер уравнений",
        description: "Реши 10 задач по алгебре из курса.",
        icon: "x"
      },
      {
        id: "geometry_genius",
        title: "Геометрический гений",
        description: "Открой все фигуры в разделе теории.",
        icon: "◯"
      },
      {
        id: "unshakable",
        title: "Непоколебимый",
        description: "Закончи урок, когда у тебя осталась ровно одна жизнь.",
        icon: "♥"
      }
    ];

    const THEORY_LIBRARY = [
      {
        id: "algebra_intro",
        category: "Алгебра",
        title: "Алгебра (базовая)",
        definition: "Алгебра изучает числа, выражения, уравнения и зависимости между величинами. Она помогает переводить задачи на язык формул и шаг за шагом находить ответ. В школьном курсе 5–9 класса алгебра учит работать с переменными, степенями, функциями и прогрессиями.",
        formulas: [
          {
            formula: "ax + b = 0",
            explanation: "Линейное уравнение содержит переменную x в первой степени. Чтобы найти x, нужно перенести известные числа в одну сторону и разделить на коэффициент a."
          },
          {
            formula: "(a + b)^2 = a^2 + 2ab + b^2",
            explanation: "Квадрат суммы помогает быстро раскрывать скобки. Вместо умножения двучлена на двучлен удобно сразу записать три слагаемых."
          },
          {
            formula: "y = kx + b",
            explanation: "Так записывают линейную функцию. Число k показывает, как быстро меняется y, а b отвечает за точку пересечения с осью y."
          }
        ],
        examples: [
          "Пример уравнения: 3x + 9 = 0 → 3x = -9 → x = -3.",
          "Пример раскрытия скобок: (x + 4)^2 = x^2 + 8x + 16.",
          "Пример функции: если y = 2x + 1 и x = 3, то y = 7."
        ]
      },
      {
        id: "geometry_intro",
        category: "Геометрия",
        title: "Геометрия",
        definition: "Геометрия изучает формы, размеры и расположение фигур. Она отвечает на вопросы о длинах, углах, площадях и объёмах. В школьной геометрии важно не только помнить формулы, но и понимать, откуда они берутся и когда их можно применять.",
        formulas: [
          {
            formula: "P = a + b + c",
            explanation: "Периметр треугольника равен сумме длин всех его сторон."
          },
          {
            formula: "S = a * b",
            explanation: "Площадь прямоугольника равна произведению длины и ширины."
          },
          {
            formula: "V = Sосн * h",
            explanation: "Объём многих тел можно найти как площадь основания, умноженную на высоту."
          }
        ],
        examples: [
          "Если у прямоугольника стороны 5 см и 3 см, то S = 15 см².",
          "Если у треугольника стороны 4 см, 5 см и 6 см, то P = 15 см."
        ]
      },
      {
        id: "stereometry_intro",
        category: "Стереометрия",
        title: "Стереометрия",
        definition: "Стереометрия изучает объёмные фигуры в пространстве. Здесь появляются длина, площадь поверхности и объём. Важно различать поверхность тела, например сферу, и само тело, например шар.",
        formulas: [
          {
            formula: "Vкуба = a^3",
            explanation: "У куба все рёбра равны, поэтому объём равен произведению трёх одинаковых измерений."
          },
          {
            formula: "Vцилиндра = πr^2h",
            explanation: "Сначала находим площадь круглого основания πr^2, а затем умножаем её на высоту h."
          },

          viewedTheory: [],
          achievements: [],
          lessonStates: {}
        }
      };
    }

    function saveData(data = appData) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function ensureDataShape(data) {
      const safeData = createDefaultData();
      safeData.mode = data?.mode === "teacher" ? "teacher" : "student";
      safeData.courses = Array.isArray(data?.courses) && data.courses.length ? data.courses : getDefaultCourses();
      safeData.user = {
        ...safeData.user,
        ...(data?.user || {}),
        completedLessons: Array.isArray(data?.user?.completedLessons) ? data.user.completedLessons : [],
        failedLessons: Array.isArray(data?.user?.failedLessons) ? data.user.failedLessons : [],
        viewedTheory: Array.isArray(data?.user?.viewedTheory) ? data.user.viewedTheory : [],
        achievements: Array.isArray(data?.user?.achievements) ? data.user.achievements : [],
        lessonStates: typeof data?.user?.lessonStates === "object" && data.user.lessonStates ? data.user.lessonStates : {}
      };
      saveData(safeData);
      return safeData;
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          const freshData = createDefaultData();
          saveData(freshData);
          return freshData;
        }
        return ensureDataShape(JSON.parse(raw));
      } catch (error) {
        const fallback = createDefaultData();
        saveData(fallback);
        return fallback;
      }
    }

    let appData = loadData();

    function escapeHTML(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatText(value) {
      return escapeHTML(value).replace(/\n/g, "<br>");
    }

    function slugify(value) {
      return String(value || "item")
        .toLowerCase()
        .trim()
        .replace(/[^a-zа-я0-9]+/gi, "_")
        .replace(/^_+|_+$/g, "")
        .slice(0, 36) || "item";
    }

    function uid(prefix, title) {
      return prefix + "_" + slugify(title) + "_" + Date.now().toString(36);
    }

    function normalizeAnswer(answer) {
      return String(answer || "").trim().replace(/\s+/g, " ").toLowerCase();
    }

    function getCourseById(courseId) {
      return appData.courses.find((course) => course.id === courseId) || null;
    }

    function getModuleById(course, moduleId) {
      return course?.modules.find((module) => module.id === moduleId) || null;
    }

    function getLessonById(module, lessonId) {
      return module?.lessons.find((lesson) => lesson.id === lessonId) || null;
    }

    function getTotalLessons(course) {
      return course.modules.reduce((sum, module) => sum + module.lessons.length, 0);
    }

    function getCourseCompletedCount(course) {
      const completed = new Set(appData.user.completedLessons);
      return course.modules.reduce((sum, module) => sum + module.lessons.filter((lesson) => completed.has(lesson.id)).length, 0);
    }

    function getLessonState(lessonId) {
      if (!appData.user.lessonStates[lessonId]) {
        appData.user.lessonStates[lessonId] = { livesLeft: 3, completed: false, failed: false };
        saveData();
      }
      return appData.user.lessonStates[lessonId];
    }

    function currentLivesDisplay() {
      if (!state.selectedLessonId) return 3;
      return getLessonState(state.selectedLessonId).livesLeft;
    }

    function renderHearts(livesLeft) {
      return `<span class="hearts">${[1, 2, 3].map((life) => `<span class="heart ${life <= livesLeft ? "" : "empty"}">♥</span>`).join("")}</span>`;
    }

    function showToast(message) {
      const toastRoot = document.getElementById("toastRoot");
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = message;
      toastRoot.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    function unlockAchievement(achievementId) {
      if (!appData.user.achievements.includes(achievementId)) {
        appData.user.achievements.push(achievementId);
        const achievement = ACHIEVEMENTS.find((item) => item.id === achievementId);
        saveData();
        if (achievement) showToast("Открыто достижение: " + achievement.title);
      }
    }

    function updateAchievements() {
      if (appData.user.completedLessons.length >= 5) unlockAchievement("young_pythagor");
      if (appData.user.algebraSolved >= 10) unlockAchievement("equation_master");
      if (FIGURE_THEORY_IDS.every((id) => appData.user.viewedTheory.includes(id))) unlockAchievement("geometry_genius");
    }

    function recordTheoryView(articleId) {
      if (!appData.user.viewedTheory.includes(articleId)) {
        appData.user.viewedTheory.push(articleId);
        saveData();
      }
      updateAchievements();
    }

    function setView(nextView) {
      state.view = nextView;
      state.lessonFeedback = null;
      if (nextView !== "lesson") state.selectedLessonId = null;
      renderApp();

    }

      state.sidebarOpen = false;

      renderSidebar();

      state.selectedModuleId = null;

      setView("course");

    function openLesson(courseId, moduleId, lessonId) {

    function getLessonStatus(lessonId) {
      const lessonState = getLessonState(lessonId);
      if (lessonState.completed) return { label: "Пройден", type: "success" };
      if (lessonState.failed) return { label: "Провален", type: "danger" };
      if (lessonState.livesLeft < 3) return { label: "В процессе", type: "warning" };
      return { label: "Новый", type: "" };
    }

    function resetLessonProgress(lessonId) {
      appData.user.lessonStates[lessonId] = { livesLeft: 3, completed: false, failed: false };
      appData.user.failedLessons = appData.user.failedLessons.filter((id) => id !== lessonId);
      saveData();
      state.lessonFeedback = null;
      renderApp();
      renderSidebar();
    }

    function submitLessonAnswer(form) {
      const course = getCourseById(state.selectedCourseId);
      const module = getModuleById(course, state.selectedModuleId);
      const lesson = getLessonById(module, state.selectedLessonId);
      if (!lesson) return;

      const lessonState = getLessonState(lesson.id);
      if (lessonState.completed) {
        state.lessonFeedback = { type: "success", text: "Урок уже завершён. Можно пройти его заново без дополнительного XP." };
        renderApp();
        return;
      }
      if (lessonState.failed) {
        state.lessonFeedback = { type: "warning", text: "Попытка закончилась. Нажми «Начать заново», чтобы вернуть 3 жизни." };
        renderApp();
        return;
      }

      let isCorrect = false;

      if (lesson.task.type === "single") {
        const selected = form.querySelector('input[name="answer"]:checked');
        if (!selected) {
          state.lessonFeedback = { type: "warning", text: "Сначала выбери один вариант ответа." };
          renderApp();
          return;
        }
        isCorrect = selected.value === lesson.task.correctAnswer;
      }

      if (lesson.task.type === "multiple") {
        const selected = Array.from(form.querySelectorAll('input[name="answer"]:checked')).map((input) => input.value).sort();
        if (!selected.length) {
          state.lessonFeedback = { type: "warning", text: "Отметь один или несколько верных вариантов." };
          renderApp();
          return;
        }
        const correct = [...lesson.task.correctAnswer].sort();
        isCorrect = selected.length === correct.length && selected.every((value, index) => value === correct[index]);
      }

      if (lesson.task.type === "text") {
        const value = form.querySelector('input[name="answer_text"]').value;
        if (!value.trim()) {
          state.lessonFeedback = { type: "warning", text: "Введи ответ в поле." };
          renderApp();
          return;
        }
        isCorrect = normalizeAnswer(value) === normalizeAnswer(lesson.task.correctAnswer);
      }

      if (isCorrect) {
        const wasCompleted = lessonState.completed;
        lessonState.completed = true;
        lessonState.failed = false;
        if (!appData.user.completedLessons.includes(lesson.id)) appData.user.completedLessons.push(lesson.id);
        appData.user.failedLessons = appData.user.failedLessons.filter((id) => id !== lesson.id);
        if (!wasCompleted) {
          appData.user.xp += XP_PER_LESSON;
          appData.user.algebraSolved += 1;
        }
        if (lessonState.livesLeft === 1) unlockAchievement("unshakable");
        state.lessonFeedback = { type: "success", text: "Верно! Урок засчитан, а прогресс уже сохранён." };
        saveData();
        updateAchievements();
        renderApp();
        renderSidebar();
        return;
      }

      lessonState.livesLeft = Math.max(0, lessonState.livesLeft - 1);
      if (lessonState.livesLeft === 0) {
        lessonState.failed = true;
        if (!appData.user.failedLessons.includes(lesson.id)) appData.user.failedLessons.push(lesson.id);
        state.lessonFeedback = { type: "error", text: "Жизни закончились. Урок провален, но его можно пройти заново." };
      } else {
        state.lessonFeedback = { type: "error", text: "Пока не совпало. Осталось жизней: " + lessonState.livesLeft };
      }
      saveData();
      renderApp();
      renderSidebar();
    }

    function cleanupProgress(lessonIds) {
      appData.user.completedLessons = appData.user.completedLessons.filter((id) => !lessonIds.includes(id));
      appData.user.failedLessons = appData.user.failedLessons.filter((id) => !lessonIds.includes(id));
      lessonIds.forEach((lessonId) => delete appData.user.lessonStates[lessonId]);
    }

    function openModal(type, mode, context = {}) {
      state.modal = { type, mode, ...context };
      renderModal();
    }

    function closeModal() {
      state.modal = null;
      renderModal();
    }

    function deleteCourse(courseId) {
      const course = getCourseById(courseId);
      if (!course || !window.confirm("Удалить курс «" + course.title + "»?")) return;
      cleanupProgress(course.modules.flatMap((module) => module.lessons.map((lesson) => lesson.id)));
      appData.courses = appData.courses.filter((item) => item.id !== courseId);
      saveData();
      if (state.selectedCourseId === courseId) state.view = "home";
      renderApp();
      renderSidebar();
    }

    function deleteModule(courseId, moduleId) {
      const course = getCourseById(courseId);
      const module = getModuleById(course, moduleId);
      if (!course || !module || !window.confirm("Удалить модуль «" + module.title + "»?")) return;
      cleanupProgress(module.lessons.map((lesson) => lesson.id));
      course.modules = course.modules.filter((item) => item.id !== moduleId);
      saveData();
      renderApp();
      renderSidebar();
    }

    function deleteLesson(courseId, moduleId, lessonId) {
      const course = getCourseById(courseId);
      const module = getModuleById(course, moduleId);
      const lesson = getLessonById(module, lessonId);
      if (!course || !module || !lesson || !window.confirm("Удалить урок «" + lesson.title + "»?")) return;
      cleanupProgress([lesson.id]);
      module.lessons = module.lessons.filter((item) => item.id !== lessonId);
      saveData();
      if (state.selectedLessonId === lessonId) state.view = "course";
      renderApp();
      renderSidebar();
    }

    function validateLessonPayload(payload) {
      if (!payload.title || !payload.theory || !payload.formulas.length || !payload.example || !payload.task.question || !payload.task.correctAnswer) {
        throw new Error("Заполни все поля урока.");
      }
      if (payload.task.type === "text") {
        delete payload.task.options;
      } else {
        if (!payload.task.options || payload.task.options.length < 3) throw new Error("Для single и multiple нужно минимум 3 варианта ответа.");
        if (payload.task.type === "single" && !payload.task.options.includes(payload.task.correctAnswer)) {
          throw new Error("Правильный ответ должен совпадать с одним из вариантов.");
        }
        if (payload.task.type === "multiple") {
          if (!Array.isArray(payload.task.correctAnswer) || !payload.task.correctAnswer.length) throw new Error("Для multiple укажи хотя бы один правильный ответ.");
          if (!payload.task.correctAnswer.every((answer) => payload.task.options.includes(answer))) throw new Error("Все правильные ответы должны присутствовать среди вариантов.");
        }
      }
    }

    function saveModalForm(form) {
      const formData = new FormData(form);
      if (state.modal.type === "course") {
        const title = String(formData.get("title") || "").trim();
        const description = String(formData.get("description") || "").trim();
        if (!title || !description) return showToast("Заполни название и описание курса.");
        if (state.modal.mode === "create") {
          appData.courses.unshift({ id: uid("course", title), title, description, modules: [] });
          showToast("Курс создан.");
        } else {
          const course = getCourseById(state.modal.courseId);
          if (!course) return;
          course.title = title;
          course.description = description;
          showToast("Курс обновлён.");
        }
      }
      if (state.modal.type === "module") {
        const title = String(formData.get("title") || "").trim();
        if (!title) return showToast("Введите название модуля.");
        const course = getCourseById(state.modal.courseId);
        if (!course) return;
        if (state.modal.mode === "create") {
          course.modules.push({ id: uid("module", title), title, lessons: [] });
          showToast("Модуль добавлен.");
        } else {
          const module = getModuleById(course, state.modal.moduleId);
          if (!module) return;
          module.title = title;
          showToast("Модуль обновлён.");
        }
      }
      if (state.modal.type === "lesson") {
        const taskType = formData.get("taskType");
        const optionsText = String(formData.get("options") || "").trim();
        const correctRaw = String(formData.get("correctAnswer") || "").trim();
        const payload = {
          id: state.modal.lessonId || uid("lesson", formData.get("title")),
          title: String(formData.get("title") || "").trim(),
          theory: String(formData.get("theory") || "").trim(),
          formulas: String(formData.get("formulas") || "").split("\n").map((item) => item.trim()).filter(Boolean),
          example: String(formData.get("example") || "").trim(),
          task: {
            type: taskType,
            question: String(formData.get("question") || "").trim(),
            correctAnswer: taskType === "multiple" ? correctRaw.split("\n").map((item) => item.trim()).filter(Boolean) : correctRaw
          }
        };
        if (taskType !== "text") payload.task.options = optionsText.split("\n").map((item) => item.trim()).filter(Boolean);
        try {
          validateLessonPayload(payload);
        } catch (error) {
          return showToast(error.message);
        }
        const course = getCourseById(state.modal.courseId);
        const module = getModuleById(course, state.modal.moduleId);
        if (!course || !module) return;
        if (state.modal.mode === "create") {
          module.lessons.push(payload);
          showToast("Урок добавлен.");
        } else {
          const index = module.lessons.findIndex((lesson) => lesson.id === state.modal.lessonId);
          if (index === -1) return;
          module.lessons[index] = payload;
          showToast("Урок обновлён.");
        }
      }
      saveData();
      closeModal();
      renderApp();
      renderSidebar();
    }

            <h2 class="section-title">Курсы</h2>
            <p class="muted">Стартовый курс уже загружен, поэтому можно сразу переходить к урокам.</p>
          </div>
          ${appData.mode === "teacher" ? '<button class="button" data-open-create-course>➕ Добавить курс</button>' : ""}
        </section>
        <section class="course-grid">${courseCards}</section>
      `;
    }

    function renderCourseView() {
      const course = getCourseById(state.selectedCourseId);
      if (!course) return renderHome();
      const totalLessons = getTotalLessons(course);
      const completedLessons = getCourseCompletedCount(course);
      const percent = totalLessons ? Math.round((completedLessons / totalLessons) * 100) : 0;
      return `
        <div class="breadcrumbs">
          <button data-sidebar-view="home">Главная</button><span>›</span><span>${escapeHTML(course.title)}</span>
        </div>
        <section class="detail-grid">
          <div class="panel">
            <div class="section-head">
              <div>
                <h2 class="section-title">${escapeHTML(course.title)}</h2>
                <p class="muted">${escapeHTML(course.description)}</p>
              </div>
              <div class="actions-row">
                ${appData.mode === "teacher" ? `<button class="ghost-button" data-edit-course="${course.id}">Редактировать курс</button>` : ""}
                ${appData.mode === "teacher" ? `<button class="button" data-open-module-modal="${course.id}">➕ Добавить модуль</button>` : ""}
              </div>
            </div>
            <div class="course-meta">
              <span class="meta-tag">Модулей: ${course.modules.length}</span>
              <span class="meta-tag">Уроков: ${totalLessons}</span>
              <span class="meta-tag">Прогресс: ${percent}%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
          </div>
          <div class="panel">
            <h3 class="card-title">Как учиться в курсе</h3>
            <div class="formula-list">
              <div class="mini-note">Читай теорию и пример решения до задания.</div>
              <div class="mini-note">За верный ответ получай XP, за ошибку теряй одну жизнь.</div>
              <div class="mini-note">В режиме учителя можно редактировать курс и проходить его как ученик.</div>
            </div>
          </div>
        </section>
        <section class="module-grid">
          ${course.modules.map((module) => `
            <article class="module-card">
              <div class="lesson-row-head">
                <h3>${escapeHTML(module.title)}</h3>
                <div class="actions-row">
                  ${appData.mode === "teacher" ? `<button class="ghost-button" data-edit-module="${course.id}|${module.id}">Изменить</button>` : ""}
                  ${appData.mode === "teacher" ? `<button class="ghost-button" data-delete-module="${course.id}|${module.id}">Удалить</button>` : ""}
                </div>
              </div>
              <p class="muted">Уроков в модуле: ${module.lessons.length}</p>
              <ul class="lesson-list">
                ${module.lessons.map((lesson) => {
                  const lessonStatus = getLessonStatus(lesson.id);
                  return `
                    <li class="lesson-row">
                      <div class="lesson-row-head">
                        <h4>${escapeHTML(lesson.title)}</h4>
                        <span class="status-tag ${lessonStatus.type}">${lessonStatus.label}</span>
                      </div>
                      <p class="muted">${escapeHTML(lesson.theory.slice(0, 140))}...</p>
                      <div class="actions-row">
                        <button class="button" data-open-lesson="${course.id}|${module.id}|${lesson.id}">Открыть урок</button>
                        ${appData.mode === "teacher" ? `<button class="ghost-button" data-edit-lesson="${course.id}|${module.id}|${lesson.id}">Редактировать</button>` : ""}
                        ${appData.mode === "teacher" ? `<button class="ghost-button" data-delete-lesson="${course.id}|${module.id}|${lesson.id}">Удалить</button>` : ""}
                      </div>
                    </li>
                  `;
                }).join("")}
              </ul>
              ${appData.mode === "teacher" ? `<div class="actions-row"><button class="button" data-open-lesson-modal="${course.id}|${module.id}">➕ Добавить урок</button></div>` : ""}
            </article>
          `).join("")}
        </section>
      `;
    }

    function renderTask(lesson) {
      if (lesson.task.type === "single") {
        return `<div class="task-options">${lesson.task.options.map((option, index) => `
          <label class="option-card">
            <input type="radio" name="answer" value="${escapeHTML(option)}" />
            <span>${String.fromCharCode(65 + index)}) ${escapeHTML(option)}</span>
          </label>
        `).join("")}</div>`;
      }
      if (lesson.task.type === "multiple") {
        return `<div class="task-options">${lesson.task.options.map((option) => `
          <label class="option-card">
            <input type="checkbox" name="answer" value="${escapeHTML(option)}" />
            <span>${escapeHTML(option)}</span>
          </label>
        `).join("")}</div>`;
      }
      return `
        <label class="label">
          Ответ
          <input class="input" type="text" name="answer_text" autocomplete="off" placeholder="Например: 4" />
        </label>
      `;
    }

    // Экран урока объединяет теорию, формулы, пример и одно практическое задание.
    function renderLessonView() {
      const course = getCourseById(state.selectedCourseId);
      const module = getModuleById(course, state.selectedModuleId);
      const lesson = getLessonById(module, state.selectedLessonId);
      if (!course || !module || !lesson) return renderHome();
      const lessonState = getLessonState(lesson.id);
      return `
        <div class="breadcrumbs">
          <button data-sidebar-view="home">Главная</button><span>›</span>
          <button data-open-course="${course.id}">${escapeHTML(course.title)}</button><span>›</span>
          <span>${escapeHTML(lesson.title)}</span>
        </div>
        <section class="lesson-layout">
          <div class="lesson-copy">
            <div class="tag-row">
              <span class="soft-chip">Модуль: ${escapeHTML(module.title)}</span>
              <span class="soft-chip">XP за урок: ${XP_PER_LESSON}</span>
            </div>
            <h2 class="section-title">${escapeHTML(lesson.title)}</h2>
            <p>${formatText(lesson.theory)}</p>
            <div class="module-grid">
              ${lesson.formulas.map((formula) => `<div class="formula-card"><div class="formula-sign">${escapeHTML(formula)}</div><p class="muted">Используй формулу как подсказку при решении.</p></div>`).join("")}
            </div>
            <div class="example-card" style="margin-top:18px;"><p>${formatText(lesson.example)}</p></div>
          </div>
          <div class="task-panel">
            <div class="section-head">
              <div>
                <h3 class="card-title">Практика</h3>
                <p class="muted">${escapeHTML(lesson.task.question)}</p>
              </div>
              <div>${renderHearts(lessonState.livesLeft)}</div>
            </div>
            <div class="course-meta"><span class="meta-tag">Статус: ${getLessonStatus(lesson.id).label}</span></div>
            <form data-lesson-form>
              ${renderTask(lesson)}
              <div class="actions-row">
                <button type="submit" class="button">Проверить ответ</button>
                <button type="button" class="ghost-button" data-reset-lesson="${lesson.id}">Начать заново</button>
              </div>
            </form>
            ${state.lessonFeedback ? `<div class="feedback-box ${state.lessonFeedback.type === "success" ? "success" : state.lessonFeedback.type === "warning" ? "warning" : "error"}">${escapeHTML(state.lessonFeedback.text)}</div>` : ""}
            <div class="mini-note" style="margin-top:16px;">Неправильный ответ отнимает одну жизнь. Если жизни закончатся, урок считается проваленным, но его можно пройти снова.</div>
          </div>
        </section>
      `;
    }

    function renderTheoryView() {
      const article = THEORY_LIBRARY.find((item) => item.id === state.selectedTheoryId) || THEORY_LIBRARY[0];
      const grouped = THEORY_LIBRARY.reduce((map, item) => {
        if (!map[item.category]) map[item.category] = [];
        map[item.category].push(item);
        return map;
      }, {});
      return `
        <section class="theory-grid">
          <div class="panel theory-sidebar">
            <div class="section-head">
              <div>
                <h2 class="section-title">Раздел «Теория»</h2>
                <p class="muted">Открывай темы и фигуры как справочник. Просмотр фигур идёт в достижения.</p>
              </div>
            </div>
            ${Object.entries(grouped).map(([category, items]) => `
              <div class="theory-card">
                <h3>${escapeHTML(category)}</h3>
                <div class="theory-sidebar">
                  ${items.map((item) => `<button class="theory-link ${item.id === article.id ? "active" : ""}" data-theory-id="${item.id}">${escapeHTML(item.title)}</button>`).join("")}
                </div>
              </div>
            `).join("")}
          </div>
          <article class="theory-article">
            <div class="tag-row">
              <span class="soft-chip">${escapeHTML(article.category)}</span>
              <span class="soft-chip">Открыто тем: ${appData.user.viewedTheory.length}</span>
            </div>
            <h2 class="section-title">${escapeHTML(article.title)}</h2>
            <p>${formatText(article.definition)}</p>
            <div class="module-grid">
              ${article.formulas.map((item) => `<div class="formula-card"><div class="formula-sign">${escapeHTML(item.formula)}</div><p>${escapeHTML(item.explanation)}</p></div>`).join("")}
            </div>
            <div class="formula-list" style="margin-top:18px;">
              ${article.examples.map((example) => `<div class="example-card">${escapeHTML(example)}</div>`).join("")}
            </div>
          </article>
        </section>
      `;
    }

    function renderModal() {
      const root = document.getElementById("modalRoot");
      if (!state.modal) {
        root.innerHTML = "";
        return;
      }
      let title = "";
      let description = "";
      let body = "";
      if (state.modal.type === "course") {
        const course = state.modal.mode === "edit" ? getCourseById(state.modal.courseId) : null;
        title = state.modal.mode === "create" ? "Новый курс" : "Редактирование курса";
        description = "Курс должен содержать название, описание и далее модули с уроками.";
        body = `<form data-modal-form><div class="form-grid">
          <label class="label full">Название курса<input class="input" name="title" value="${escapeHTML(course?.title || "")}" /></label>
          <label class="label full">Описание<textarea class="textarea" name="description">${escapeHTML(course?.description || "")}</textarea></label>
        </div><div class="actions-row"><button type="submit" class="button">Сохранить</button><button type="button" class="ghost-button" data-close-modal>Отмена</button></div></form>`;
      }
      if (state.modal.type === "module") {
        const course = getCourseById(state.modal.courseId);
        const module = state.modal.mode === "edit" ? getModuleById(course, state.modal.moduleId) : null;
        title = state.modal.mode === "create" ? "Новый модуль" : "Редактирование модуля";
        description = "Модуль объединяет уроки по одной теме.";
        body = `<form data-modal-form><div class="form-grid">
          <label class="label full">Название модуля<input class="input" name="title" value="${escapeHTML(module?.title || "")}" /></label>
        </div><div class="actions-row"><button type="submit" class="button">Сохранить</button><button type="button" class="ghost-button" data-close-modal>Отмена</button></div></form>`;
      }
      if (state.modal.type === "lesson") {
        const course = getCourseById(state.modal.courseId);
        const module = getModuleById(course, state.modal.moduleId);
        const lesson = state.modal.mode === "edit" ? getLessonById(module, state.modal.lessonId) : null;
        title = state.modal.mode === "create" ? "Новый урок" : "Редактирование урока";
        description = "Заполни теорию, формулы, пример и одно задание строго по структуре.";
        body = `<form data-modal-form><div class="form-grid">
          <label class="label full">Название урока<input class="input" name="title" value="${escapeHTML(lesson?.title || "")}" /></label>
          <label class="label full">Теория<textarea class="textarea" name="theory">${escapeHTML(lesson?.theory || "")}</textarea></label>
          <label class="label full">Формулы<textarea class="textarea" name="formulas">${escapeHTML(lesson?.formulas?.join("\n") || "")}</textarea></label>
          <label class="label full">Пример решения<textarea class="textarea" name="example">${escapeHTML(lesson?.example || "")}</textarea></label>
          <label class="label">Тип задания<select class="select" name="taskType">
            <option value="single" ${lesson?.task?.type === "single" ? "selected" : ""}>single</option>
            <option value="multiple" ${lesson?.task?.type === "multiple" ? "selected" : ""}>multiple</option>
            <option value="text" ${lesson?.task?.type === "text" ? "selected" : ""}>text</option>
          </select></label>
          <label class="label full">Вопрос задания<textarea class="textarea" name="question">${escapeHTML(lesson?.task?.question || "")}</textarea></label>
          <label class="label full">Варианты ответа<textarea class="textarea" name="options">${escapeHTML(Array.isArray(lesson?.task?.options) ? lesson.task.options.join("\n") : "")}</textarea></label>
          <label class="label full">Правильный ответ<textarea class="textarea" name="correctAnswer">${escapeHTML(Array.isArray(lesson?.task?.correctAnswer) ? lesson.task.correctAnswer.join("\n") : lesson?.task?.correctAnswer || "")}</textarea></label>
        </div><div class="actions-row"><button type="submit" class="button">Сохранить</button><button type="button" class="ghost-button" data-close-modal>Отмена</button></div></form>`;
      }
      root.innerHTML = `<div class="modal-layer"><div class="modal"><div class="modal-head"><div><h2>${escapeHTML(title)}</h2><p class="muted">${escapeHTML(description)}</p></div><button class="close-button" data-close-modal>✕</button></div>${body}</div></div>`;
    }

    function renderApp() {
      renderHeader();
      renderSidebar();
      renderModal();
      const app = document.getElementById("app");
      if (state.view === "course") return (app.innerHTML = renderCourseView());
      if (state.view === "lesson") return (app.innerHTML = renderLessonView());
      if (state.view === "theory") return (app.innerHTML = renderTheoryView());
      app.innerHTML = renderHome();
    }

    document.addEventListener("click", (event) => {
      const target = event.target.closest("button, [data-theory-id]");
      if (!target) return;
      if (target.matches("[data-nav]")) return target.dataset.nav === "theory" ? openTheory(state.selectedTheoryId || THEORY_LIBRARY[0].id) : setView("home");
      if (target.id === "burgerButton") return openSidebar();
      if (target.hasAttribute("data-close-sidebar")) return closeSidebar();
      if (target.hasAttribute("data-close-modal")) return closeModal();
      if (target.hasAttribute("data-sidebar-view")) return closeSidebar(), target.dataset.sidebarView === "theory" ? openTheory(state.selectedTheoryId || THEORY_LIBRARY[0].id) : setView("home");
      if (target.hasAttribute("data-sidebar-scroll")) return document.getElementById("settingsAnchor")?.scrollIntoView({ behavior: "smooth", block: "start" });
      if (target.hasAttribute("data-mode")) return setMode(target.dataset.mode);
      if (target.hasAttribute("data-open-create-course")) return closeSidebar(), openModal("course", "create");
      if (target.hasAttribute("data-edit-course")) return openModal("course", "edit", { courseId: target.dataset.editCourse });
      if (target.hasAttribute("data-delete-course")) return deleteCourse(target.dataset.deleteCourse);
      if (target.hasAttribute("data-open-course")) return openCourse(target.dataset.openCourse);
      if (target.hasAttribute("data-open-module-modal")) return openModal("module", "create", { courseId: target.dataset.openModuleModal });
      if (target.hasAttribute("data-edit-module")) { const [courseId, moduleId] = target.dataset.editModule.split("|"); return openModal("module", "edit", { courseId, moduleId }); }
      if (target.hasAttribute("data-delete-module")) { const [courseId, moduleId] = target.dataset.deleteModule.split("|"); return deleteModule(courseId, moduleId); }
      if (target.hasAttribute("data-open-lesson-modal")) { const [courseId, moduleId] = target.dataset.openLessonModal.split("|"); return openModal("lesson", "create", { courseId, moduleId }); }
      if (target.hasAttribute("data-edit-lesson")) { const [courseId, moduleId, lessonId] = target.dataset.editLesson.split("|"); return openModal("lesson", "edit", { courseId, moduleId, lessonId }); }
      if (target.hasAttribute("data-delete-lesson")) { const [courseId, moduleId, lessonId] = target.dataset.deleteLesson.split("|"); return deleteLesson(courseId, moduleId, lessonId); }
      if (target.hasAttribute("data-open-lesson")) { const [courseId, moduleId, lessonId] = target.dataset.openLesson.split("|"); return openLesson(courseId, moduleId, lessonId); }
      if (target.hasAttribute("data-reset-lesson")) return resetLessonProgress(target.dataset.resetLesson);
      if (target.hasAttribute("data-theory-id")) return openTheory(target.dataset.theoryId);
    });

    document.getElementById("sidebarScrim").addEventListener("click", closeSidebar);

    document.addEventListener("submit", (event) => {
      if (event.target.matches("[data-modal-form]")) {
        event.preventDefault();
        saveModalForm(event.target);
      }
      if (event.target.matches("[data-lesson-form]")) {
        event.preventDefault();
        submitLessonAnswer(event.target);
      }
    });

    renderApp();
  </script>
</body>
</html>
